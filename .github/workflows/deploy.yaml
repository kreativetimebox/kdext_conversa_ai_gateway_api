name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SSH_PORT: "22"
  # Update these according to your server configuration
  SSH_USER: root
  REMOTE_DIR: /opt/voice-gateway
  APP_PORT: "8001"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload code to server
        run: |
          HOST="${{ secrets.SERVER_HOST }}"
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$HOST" "mkdir -p $REMOTE_DIR"
          tar czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            . | ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$HOST" \
                "tar xzf - -C $REMOTE_DIR"

      - name: Build & restart
        run: |
          HOST="${{ secrets.SERVER_HOST }}"
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" \
            -o ServerAliveInterval=60 -o ServerAliveCountMax=30 -T \
            "$SSH_USER@$HOST" "bash -s" << 'SCRIPT'
          set -euo pipefail
          
          # Use the REMOTE_DIR environment variable
          cd /opt/voice-gateway

          # Voice Gateway uses Docker Compose per DEPLOYMENT.md
          echo "Building and starting Voice Gateway via Docker Compose..."
          docker compose up -d --build

          # Verify it comes online
          ready=false
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8001/health; then
              echo "✅ Voice Gateway service is healthy"
              ready=true
              break
            fi
            sleep 5
          done
          
          if [ "$ready" = false ]; then
            echo "❌ Voice Gateway service did not become ready"
            docker compose logs --tail 80 || true
            exit 1
          fi
          SCRIPT
