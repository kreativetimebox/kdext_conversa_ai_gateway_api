name: Deploy

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  SSH_PORT: "22"
  # Update these according to your server configuration
  SSH_USER: balabantaray-user
  REMOTE_DIR: /home/balabantaray-user/voice-gateway
  APP_PORT: "8001"

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh && chmod 700 ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -p "$SSH_PORT" "${{ secrets.SERVER_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload code to server
        run: |
          HOST="${{ secrets.SERVER_HOST }}"
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$HOST" "mkdir -p $REMOTE_DIR"
          tar czf - \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            . | ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$HOST" \
                "tar xzf - -C $REMOTE_DIR"

      - name: Write .env file on server
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES: ${{ secrets.JWT_EXPIRES }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL }}
          CREATE_DB_TABLES: ${{ secrets.CREATE_DB_TABLES }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_S3_BUCKET: ${{ secrets.AWS_S3_BUCKET }}
          AWS_S3_REGION: ${{ secrets.AWS_S3_REGION }}
          STT_ENGINE_URL: ${{ secrets.STT_ENGINE_URL }}
          TTS_ENGINE_URL: ${{ secrets.TTS_ENGINE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
        run: |
          HOST="${{ secrets.SERVER_HOST }}"
          printf '%s\n' \
            "DATABASE_URL=${DATABASE_URL}" \
            "JWT_SECRET=${JWT_SECRET}" \
            "JWT_EXPIRES=${JWT_EXPIRES}" \
            "ENVIRONMENT=${ENVIRONMENT}" \
            "LOG_LEVEL=${LOG_LEVEL}" \
            "CREATE_DB_TABLES=${CREATE_DB_TABLES}" \
            "AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}" \
            "AWS_S3_BUCKET=${AWS_S3_BUCKET}" \
            "AWS_S3_REGION=${AWS_S3_REGION}" \
            "STT_ENGINE_URL=${STT_ENGINE_URL}" \
            "TTS_ENGINE_URL=${TTS_ENGINE_URL}" \
            "SMTP_HOST=${SMTP_HOST}" \
            "SMTP_PORT=${SMTP_PORT}" \
            "SMTP_USER=${SMTP_USER}" \
            "SMTP_PASSWORD=${SMTP_PASSWORD}" \
            "EMAIL_FROM=${EMAIL_FROM}" \
          | ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$HOST" \
              "cat > $REMOTE_DIR/.env && chmod 600 $REMOTE_DIR/.env"

      - name: Build & restart
        run: |
          HOST="${{ secrets.SERVER_HOST }}"
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" \
            -o ServerAliveInterval=60 -o ServerAliveCountMax=30 -T \
            "$SSH_USER@$HOST" "bash -s" << 'SCRIPT'
          set -euo pipefail

          container_name="conversa-ai-gateway"
          image_name="kdext-conversa-ai-gateway:latest"

          cd /home/balabantaray-user/voice-gateway

          echo "Building Docker image..."
          docker build -t "$image_name" .

          echo "Stopping old container (if running)..."
          docker stop "$container_name" 2>/dev/null || true
          docker rm   "$container_name" 2>/dev/null || true

          echo "Starting container..."
          docker run -d --name "$container_name" \
            --network host \
            --restart unless-stopped \
            --env-file /home/balabantaray-user/voice-gateway/.env \
            "$image_name"

          echo "Running database migrations..."
          docker exec "$container_name" alembic upgrade head

          ready=false
          for i in $(seq 1 30); do
            if curl -fs http://localhost:8001/health; then
              echo "Service is healthy"
              ready=true
              break
            fi
            sleep 5
          done

          if [ "$ready" = false ]; then
            echo "Service did not become ready"
            docker logs "$container_name" --tail 80 || true
            exit 1
          fi
          SCRIPT
